services:
  postgres:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: zai_cts
      POSTGRES_USER: zai_cts
      POSTGRES_PASSWORD: zai_cts
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../database/schemas/core.sql:/docker-entrypoint-initdb.d/001_core.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zai_cts -d zai_cts"]
      interval: 10s
      timeout: 5s
      retries: 10

  database-migrations:
    image: postgres:17-alpine
    environment:
      PGPASSWORD: zai_cts
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../database/migrations:/migrations:ro
    command:
      - sh
      - -c
      - >-
        psql -h postgres -U zai_cts -d zai_cts -v ON_ERROR_STOP=1
        -f /migrations/0002_enterprise_domains.sql
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5673:5672"
      - "15673:15672"

  carbon-registry-service:
    build:
      context: ../../backend/services/carbon-registry-service
    environment:
      DATABASE_URL: postgresql+asyncpg://zai_cts:zai_cts@postgres:5432/zai_cts
      SERVICE_NAME: carbon-registry-service
      ENVIRONMENT: local
      AI_MODEL_URL: http://ai-verification-service:8201
    depends_on:
      postgres:
        condition: service_healthy
      database-migrations:
        condition: service_completed_successfully
      ai-verification-service:
        condition: service_started
    ports:
      - "8101:8101"

  ai-verification-service:
    build:
      context: ../../ai/verification-service

  ai-validation-service:
    build:
      context: ../../backend/services/ai-validation-service
    environment:
      DATABASE_URL: postgresql+asyncpg://zai_cts:zai_cts@postgres:5432/zai_cts
      REDIS_URL: redis://redis:6379/1
      CARBON_REGISTRY_URL: http://carbon-registry-service:8101
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      database-migrations:
        condition: service_completed_successfully
      redis:
        condition: service_started
    ports:
      - "8103:8103"

  gis-service:
    build:
      context: ../../backend/services/gis-service
    environment:
      POSTGIS_HOST: postgres
      POSTGIS_PORT: 5432
      POSTGIS_DB: zai_cts
      POSTGIS_USER: zai_cts
      POSTGIS_PASSWORD: zai_cts
    depends_on:
      postgres:
        condition: service_healthy
      database-migrations:
        condition: service_completed_successfully
    ports:
      - "8104:8104"

  marketplace-service:
    build:
      context: ../../backend/services/marketplace-service
    environment:
      REDIS_URL: redis://redis:6379/2
      DATABASE_URL: postgresql+asyncpg://zai_cts:zai_cts@postgres:5432/zai_cts
    depends_on:
      postgres:
        condition: service_healthy
      database-migrations:
        condition: service_completed_successfully
      redis:
        condition: service_started
    ports:
      - "8106:8106"

  compliance-service:
    build:
      context: ../../backend/services/compliance-service
    environment:
      DATABASE_URL: postgresql+asyncpg://zai_cts:zai_cts@postgres:5432/zai_cts
    depends_on:
      postgres:
        condition: service_healthy
      database-migrations:
        condition: service_completed_successfully
    ports:
      - "8107:8107"

  api-gateway:
    build:
      context: ../../api-gateway
    environment:
      PORT: 8080
      CARBON_REGISTRY_URL: http://carbon-registry-service:8101
      AI_VALIDATION_URL: http://ai-validation-service:8103
      GIS_SERVICE_URL: http://gis-service:8104
      MARKETPLACE_URL: http://marketplace-service:8106
      COMPLIANCE_URL: http://compliance-service:8107
    depends_on:
      - carbon-registry-service
      - ai-validation-service
      - gis-service
      - marketplace-service
      - compliance-service
    ports:
      - "8082:8080"

  web-portal:
    build:
      context: ../../frontend/web-portal
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8082
    depends_on:
      - api-gateway
    ports:
      - "3000:3000"

volumes:
  postgres-data:
