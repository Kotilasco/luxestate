apiVersion: apps/v1
kind: Deployment
metadata:
  name: carbon-registry-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: carbon-registry-service
  template:
    metadata:
      labels:
        app: carbon-registry-service
    spec:
      containers:
        - name: carbon-registry-service
          image: zai-cts/carbon-registry-service:1.0.0
          ports:
            - containerPort: 8101
          envFrom:
            - configMapRef:
                name: zai-cts-config
            - secretRef:
                name: zai-cts-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8101
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8101
            initialDelaySeconds: 30
            periodSeconds: 20
