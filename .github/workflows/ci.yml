name: ZAI-CTS CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  carbon-registry-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/carbon-registry-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest

  api-gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build

  web-portal:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build
